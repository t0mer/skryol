name: Docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (blank = auto-increment vYYYY.M.PATCH from latest tag)"
        required: false
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: write # push the version tag that drives auto-increment

jobs:
  docker:
    # Manual runs always proceed; Release-triggered runs only on success.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # all tags needed to compute/inspect the version

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }} # via env (injection-safe)
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          NEEDS_TAG=true
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [ "$EVENT_NAME" = "workflow_run" ]; then
            VERSION="$(git describe --tags --abbrev=0)"   # Release already tagged
            NEEDS_TAG=false
          else
            VERSION="$(./scripts/next-version.sh)"         # manual run: bump patch
          fi
          [ -n "$VERSION" ] || { echo "::error::could not resolve a version"; exit 1; }
          # Git tags carry the leading v (vYYYY.M.PATCH); Docker Hub tags drop it.
          case "$VERSION" in v*) ;; *) VERSION="v$VERSION" ;; esac
          IMAGE_TAG="${VERSION#v}"
          echo "git_tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "needs_tag=$NEEDS_TAG" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: VERSION=${{ steps.version.outputs.image_tag }}
          tags: |
            techblog/skryol:latest
            techblog/skryol:${{ steps.version.outputs.image_tag }}

      # Tag AFTER a successful push so the next manual run increments. Skipped for
      # Release-driven runs (the Release workflow owns its tag).
      - name: Tag published version
        if: steps.version.outputs.needs_tag == 'true'
        env:
          GIT_TAG: ${{ steps.version.outputs.git_tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$GIT_TAG"
          git push origin "$GIT_TAG"
